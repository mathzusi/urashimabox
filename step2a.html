const memories = {

    1: {
        title: "記憶①",

    },

};

function createMemoryButton(number){

    const button =
        document.createElement("button");

    button.className =
        "memoryButton";

    button.textContent =
        memories[number].title;

    button.onclick = () => {

    document
        .getElementById("viewerTitle")
        .textContent =
        memories[number].title;

    document
        .getElementById("viewerText")
        .textContent =
        memories[number].text;

    const img =
        document.getElementById("viewerImage");

    if(number === 1){

        img.src = "turizao.png";

        img.classList.remove("hidden");

    }else{

        img.classList.add("hidden");

    }

    document
        .getElementById("memoryViewer")
        .classList.remove("hidden");
};

    document
        .getElementById("memoryPanel")
        .appendChild(button);
}

function unlockMemory(number){

    if(
        localStorage.getItem(
            "memory"+number
        ) === "true"
    ){
        return;
    }

    localStorage.setItem(
        "memory"+number,
        "true"
    );

    document
        .getElementById("memoryText")
        .textContent =
        memories[number].text;

        const img =
    document.getElementById("memoryImage");

    document

        .classList.remove("hidden");

    createMemoryButton(number);
}




function closeMemoryPopup(){

    if(nextPage !== ""){

        location.href = nextPage;
        return;

    }

    document
        .getElementById("memoryPopup")
        .classList.add("hidden");
}

function closeMemoryViewer(){

    document
        .getElementById("memoryViewer")
        .classList.add("hidden");
}

function startFog(){

    document
        .getElementById("fogLeft")
        .style.display = "block";

    document
        .getElementById("fogRight")
        .style.display = "block";

    setInterval(()=>{

        createFog("fogLeft");

        createFog("fogRight");

    },1000);
}

function createFog(id){

    const area =
        document.getElementById(id);

    const fog =
        document.createElement("div");

    fog.className = "fog";

    fog.style.left =
        Math.random()*100 + "px";

    area.appendChild(fog);

    setTimeout(()=>{
        fog.remove();
    },10000);
}

window.onload = function(){

    for(let i=1;i<=3;i++){

        if(
            localStorage.getItem(
                "memory"+i
            ) === "true"
        ){

            createMemoryButton(i);

        }

    }

}
